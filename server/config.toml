[server]
# HTTP port
port = 8788
# Number of whisper threads (0 = auto-detect CPU cores)
threads = 0

[auth]
# Frontend origin for CORS
allowed_origin = "http://localhost:5173"
# Restrict to specific email addresses (comma-separated in env var, array in TOML)
allowed_emails = []
# Restrict to specific domains (e.g. ["example.com"])
allowed_domains = []
# Skip Google token validation. Use only in development.
dev_auth_bypass = true

[model]
# Directory model files resolve against
dir = "./models"
# Bare model id used when a request omits a model selection (not a filename, e.g. "base")
default_model = "base"

# Catalog array order has no special significance; selection is by id lookup, not position.
# filename must be a real file inside [model].dir.
# quality is a free-form, operator-facing label (not used for selection logic).
# gpu is optional (defaults false); marks whether this model may run on GPU when [gpu].enabled = true.
[[model.catalog]]
filename = "ggml-tiny-q5_1.bin"
quality = "fast"

[[model.catalog]]
filename = "ggml-base-q5_1.bin"
quality = "balanced"

[[model.catalog]]
filename = "ggml-small-q5_1.bin"
quality = "high"

[[model.catalog]]
filename = "ggml-medium-q5_0.bin"
quality = "high"

[[model.catalog]]
filename = "ggml-large-v3-q5_0.bin"
quality = "best"

[gpu]
# Master switch for GPU acceleration. Requires a GPU-feature build
# (cargo build --features cuda|vulkan|hipblas); otherwise silently falls back to CPU.
enabled = false
# GPU device index
device = 0

[paths]
# Temporary working directory for job artifacts
temp_dir = "./tmp"
# Path to yt-dlp binary
ytdlp_path = "yt-dlp"
# Path to ffmpeg binary  
ffmpeg_path = "ffmpeg"

[limits]
# Maximum upload size in MB
max_upload_mb = 500

[turnstile]
# Enable Cloudflare Turnstile verification for /api/transcribe
enabled = false
# Turnstile secret key (from Cloudflare dashboard)
secret_key = ""
# Siteverify endpoint (default is correct for Cloudflare)
siteverify_url = "https://challenges.cloudflare.com/turnstile/v0/siteverify"
